{% extends "base.html" %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <h1 style="font-size: 28px; margin-bottom: 24px;">Add New Content</h1>
    
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    
    <div class="card">
        <form method="POST">
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-weight: 600; margin-bottom: 8px;">Content URL</label>
                <input type="url" name="url" required 
                    placeholder="https://example.com/blog/post or YouTube URL"
                    style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px;">
            </div>
            <div style="margin-bottom: 16px;">
                <p style="font-size: 13px; color: var(--text-secondary);">
                    Supported: Blog articles, YouTube videos, Twitter threads
                </p>
            </div>
            <button type="submit" class="btn btn-primary">Fetch Content</button>
        </form>
    </div>
</div>
{% endblock %}
